    body {

    .accent-purple {
      color: #a020f0;
    }

    .accent-red {
      color: #ff0000;
    }

    .card {
      background-color: #1e1e1e;
      border: none;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(160, 32, 240, 0.5);
    }

    .card-img-top {
      height: 200px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    .btn-primary {
      background-color: #a020f0;
      border: none;
    }

    .btn-primary:hover {
      background-color: #800080;
    }

  <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
    <div class="container" style="max-width: 400px;">
      <h2 class="fw-bold mb-4">로그인</h2>
      <form method="POST" action="/login_check" id="loginForm">
        <div class="mb-3 text-start">
          <label class="form-label">아이디</label>
          <input type="text" class="form-control" id="usernameInput" name="username" placeholder="4~20자 영문/숫자" required>
          <div class="invalid-feedback" id="usernameMsg"></div>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">패스워드</label>
          <input type="password" class="form-control" id="passwordInput" placeholder="8자 이상, 영문+숫자+특수문자" required>
          <div class="invalid-feedback" id="passwordMsg"></div>
          <input type="hidden" id="password" name="password">
        </div>
        <button type="button" onclick="validateAndLogin()" class="btn btn-primary w-100">로그인</button>
        <!-- 신규 추가 -->
        <hr>
        <a href="/register" class="btn btn-outline-secondary w-100">
          회원가입
        </a>
      </form>
    </div>
  </section>
